<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>掬月诗集 - 电子诗刊</title>
    <!-- 不依赖外部CDN，使用系统字体 -->
    <style>
        :root {
            --primary: #8B4513;
            --primary-light: #A0522D;
            --seal-red: #b93a32;
            --bg-warm: #d4c5a9;
            --bg-dark: #2c241b;
            --paper: #f7f1e3;
            --paper-dark: #ebe4d3;
            --ink: #2c241b;
            --ink-light: #5d554a;
            --gold: #c9a227;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Songti SC", "STSong", "SimSun", "华文宋体", "宋体", serif;
            background: linear-gradient(135deg, var(--bg-warm) 0%, #c4b494 50%, var(--bg-warm) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ===== 顶部导航栏 ===== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(212, 197, 169, 0.95), transparent);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--ink);
            cursor: pointer;
            transition: color 0.3s;
        }

        .logo:hover {
            color: var(--seal-red);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border: 2px solid currentColor;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.2em;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-btn {
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(0,0,0,0.1);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.875rem;
            color: var(--ink);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-btn:hover {
            background: var(--seal-red);
            color: white;
            border-color: var(--seal-red);
        }

        /* ===== 主容器 ===== */
        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5rem 1rem 2rem;
            perspective: 2000px;
        }

        /* ===== 书本容器 ===== */
        .book-wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 80vh;
            max-height: 700px;
        }

        .book {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            display: flex;
            justify-content: center;
        }

        /* ===== 书脊 ===== */
        .book-spine {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 30px;
            transform: translateX(-50%);
            background: linear-gradient(90deg, 
                rgba(44, 36, 27, 0.15) 0%, 
                rgba(44, 36, 27, 0.05) 30%,
                rgba(255, 255, 255, 0.05) 50%,
                rgba(44, 36, 27, 0.05) 70%,
                rgba(44, 36, 27, 0.15) 100%
            );
            z-index: 50;
            pointer-events: none;
        }

        /* ===== 页面容器 ===== */
        .pages-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            transform-style: preserve-3d;
        }

        /* ===== 单个翻页 ===== */
        .page-spread {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
        }

        .page-spread.active {
            pointer-events: auto;
            opacity: 1;
            visibility: visible;
        }

        .page-spread.flipped {
            opacity: 0;
            visibility: hidden;
        }

        /* ===== 左右页面 ===== */
        .page {
            width: 50%;
            height: 100%;
            background: var(--paper);
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        .page-left {
            border-radius: 4px 0 0 4px;
            box-shadow: 
                inset -20px 0 40px -10px rgba(44, 36, 27, 0.08),
                -5px 0 15px rgba(0,0,0,0.1);
            border-right: 1px solid rgba(44, 36, 27, 0.1);
        }

        .page-right {
            border-radius: 0 4px 4px 0;
            box-shadow: 
                inset 20px 0 40px -10px rgba(44, 36, 27, 0.08),
                5px 0 15px rgba(0,0,0,0.1);
            border-left: 1px solid rgba(44, 36, 27, 0.1);
        }

        /* 纸张纹理 */
        .page::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }

        /* ===== 封面样式 ===== */
        .cover-page {
            background: linear-gradient(135deg, #c4a574 0%, #a08060 50%, #c4a574 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            position: relative;
        }

        .cover-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.6' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.08;
            pointer-events: none;
        }

        .cover-decoration {
            position: absolute;
            bottom: 10%;
            left: 5%;
            right: 5%;
            height: 40%;
            opacity: 0.15;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom center;
            filter: grayscale(100%) sepia(20%);
        }

        .cover-title-vertical {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .cover-main-title {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            color: var(--ink);
            letter-spacing: 0.4em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .cover-subtitle {
            font-size: clamp(0.875rem, 2vw, 1.125rem);
            color: var(--ink-light);
            letter-spacing: 0.15em;
            padding-top: 1.5rem;
            border-top: 2px solid var(--seal-red);
        }

        .cover-seal {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            width: 60px;
            height: 60px;
            border: 3px solid var(--seal-red);
            border-radius: 4px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            padding: 4px;
            background: rgba(185, 58, 50, 0.05);
            transform: rotate(3deg);
            z-index: 1;
        }

        .cover-seal span {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--seal-red);
            font-size: 0.75rem;
            font-weight: 700;
        }

        /* ===== 目录页样式 ===== */
        .toc-page {
            padding: 3rem;
            display: flex;
            flex-direction: column;
        }

        .toc-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--seal-red);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .toc-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toc-item {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .toc-item:hover {
            background: rgba(185, 58, 50, 0.05);
            border-color: rgba(185, 58, 50, 0.2);
        }

        .toc-number {
            width: 2rem;
            font-size: 0.875rem;
            color: var(--seal-red);
            font-weight: 600;
        }

        .toc-poem-title {
            flex: 1;
            font-size: 1rem;
            color: var(--ink);
        }

        .toc-author {
            font-size: 0.875rem;
            color: var(--ink-light);
        }

        /* ===== 诗词页面样式 ===== */
        .poem-page {
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .poem-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(44, 36, 27, 0.1);
        }

        .poem-author-tag {
            font-size: 0.875rem;
            color: var(--ink-light);
            font-weight: 500;
            letter-spacing: 0.1em;
        }

        .poem-content-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 1rem 0;
        }

        .poem-vertical-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 0.75rem;
            height: 100%;
            text-align: center;
        }

        .poem-title-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid rgba(185, 58, 50, 0.3);
        }

        .poem-title {
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 900;
            color: var(--ink);
            letter-spacing: 0.25em;
        }

        .poem-author-block {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .poem-author {
            font-size: 1.125rem;
            color: var(--seal-red);
            font-weight: 600;
            letter-spacing: 0.2em;
        }

        .poem-time {
            font-size: 0.8125rem;
            color: var(--ink-light);
            font-weight: 400;
            letter-spacing: 0.05em;
            opacity: 0.7;
        }

        .poet-seal {
            width: 28px;
            height: 28px;
            border: 2px solid var(--seal-red);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.625rem;
            color: var(--seal-red);
            font-weight: 700;
            background: rgba(185, 58, 50, 0.05);
        }

        .poem-lines {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            align-items: center;
        }

        .poem-line {
            font-size: clamp(1.1rem, 2.5vw, 1.35rem);
            color: var(--ink-light);
            letter-spacing: 0.15em;
            line-height: 1.6;
            transition: color 0.3s;
            cursor: default;
        }

        .poem-line:hover {
            color: var(--ink);
        }

        .page-number {
            position: absolute;
            bottom: 1.5rem;
            font-size: 0.875rem;
            color: var(--ink-light);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .page-number-left {
            left: 2rem;
        }

        .page-number-right {
            right: 2rem;
        }

        .page-number::before,
        .page-number::after {
            content: '';
            width: 1.5rem;
            height: 1px;
            background: rgba(44, 36, 27, 0.2);
        }

        /* ===== 注释页面样式 ===== */
        .annotation-page {
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, var(--paper) 0%, var(--paper-dark) 100%);
            position: relative;
        }

        .annotation-bg-image {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0.15;
            filter: grayscale(100%) sepia(20%);
        }

        .annotation-content {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .annotation-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.5rem;
        }

        .annotation-meta {
            text-align: right;
        }

        .annotation-author-tag {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(255,255,255,0.8);
            border: 1px solid rgba(44, 36, 27, 0.1);
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--ink-light);
            letter-spacing: 0.05em;
            border-radius: 2px;
        }

        .annotation-card {
            background: rgba(252, 250, 247, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(214, 207, 194, 0.8);
            border-radius: 8px;
            padding: 1.5rem;
            padding-bottom: 5rem;
            margin-top: auto;
            box-shadow: 0 10px 30px rgba(44, 36, 27, 0.1);
            max-height: 45vh;
            overflow-y: auto;
        }

        .annotation-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .annotation-card-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--ink);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .annotation-card-title .icon {
            color: var(--seal-red);
            font-size: 1.25rem;
        }

        .annotation-card-actions {
            display: flex;
            gap: 0.5rem;
        }

        .annotation-card-actions button {
            background: none;
            border: none;
            padding: 0.375rem;
            cursor: pointer;
            color: var(--ink-light);
            transition: color 0.3s;
            border-radius: 4px;
        }

        .annotation-card-actions button:hover {
            color: var(--ink);
            background: rgba(0,0,0,0.05);
        }

        .explore-icon-btn {
            color: var(--seal-red) !important;
        }

        .explore-icon-btn:hover {
            background: rgba(185, 58, 50, 0.1) !important;
        }

        .annotation-text {
            font-size: 0.9375rem;
            line-height: 1.8;
            color: var(--ink-light);
            border-left: 3px solid rgba(185, 58, 50, 0.3);
            padding-left: 1rem;
            margin-bottom: 1.25rem;
        }

        .annotation-section {
            margin-bottom: 1rem;
        }

        .annotation-section-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--seal-red);
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .annotation-section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(185, 58, 50, 0.2);
        }

        .annotation-notes {
            font-size: 0.875rem;
            line-height: 1.7;
            color: var(--ink-light);
        }

        .annotation-note-item {
            margin-bottom: 0.5rem;
            padding-left: 1rem;
            position: relative;
        }

        .annotation-note-item::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--seal-red);
        }

        .annotation-note-more {
            color: var(--seal-red);
            font-size: 0.8125rem;
            font-style: italic;
            opacity: 0.8;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px dashed rgba(139, 69, 19, 0.2);
        }

        .annotation-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .annotation-footer-link {
            font-size: 0.75rem;
            color: var(--ink-light);
            text-decoration: none;
            transition: color 0.3s;
        }

        .annotation-footer-link:hover {
            color: var(--ink);
        }

        .annotation-explore-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--seal-red);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: gap 0.3s;
        }

        .annotation-explore-btn:hover {
            gap: 0.75rem;
        }

        /* ===== 翻页按钮 ===== */
        .page-navigation {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            padding: 0.75rem 1.5rem;
            border-radius: 3rem;
            box-shadow: 0 10px 40px rgba(44, 36, 27, 0.15);
            border: 1px solid rgba(214, 207, 194, 0.5);
            z-index: 100;
        }

        .page-nav-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--paper);
            border: 1px solid rgba(214, 207, 194, 0.8);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink);
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .page-nav-btn:hover:not(:disabled) {
            background: var(--seal-red);
            color: white;
            border-color: var(--seal-red);
            transform: scale(1.05);
        }

        .page-nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .page-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.375rem;
        }

        .page-indicator-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--ink);
            letter-spacing: 0.05em;
            max-width: 200px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .page-dots {
            display: flex;
            gap: 0.375rem;
        }

        .page-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(44, 36, 27, 0.15);
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-dot.active {
            background: var(--seal-red);
            transform: scale(1.2);
        }

        .page-dot:hover:not(.active) {
            background: rgba(44, 36, 27, 0.3);
        }

        /* ===== 目录抽屉 ===== */
        .toc-drawer {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 360px;
            max-width: 90vw;
            background: var(--paper);
            box-shadow: 5px 0 30px rgba(0,0,0,0.2);
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
            display: flex;
            flex-direction: column;
        }

        .toc-drawer.open {
            transform: translateX(0);
        }

        .toc-drawer-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(44, 36, 27, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toc-drawer-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--ink);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toc-drawer-close {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            color: var(--ink-light);
            transition: color 0.3s;
            border-radius: 4px;
        }

        .toc-drawer-close:hover {
            color: var(--ink);
            background: rgba(0,0,0,0.05);
        }

        .toc-drawer-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .toc-drawer-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 0.5rem;
            border: 1px solid transparent;
        }

        .toc-drawer-item:hover {
            background: rgba(185, 58, 50, 0.05);
            border-color: rgba(185, 58, 50, 0.2);
        }

        .toc-drawer-item.active {
            background: rgba(185, 58, 50, 0.1);
            border-color: var(--seal-red);
        }

        .toc-drawer-number {
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background: rgba(185, 58, 50, 0.1);
            color: var(--seal-red);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 1rem;
        }

        .toc-drawer-info {
            flex: 1;
        }

        .toc-drawer-poem-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 0.25rem;
        }

        .toc-drawer-author {
            font-size: 0.8125rem;
            color: var(--ink-light);
        }

        .toc-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;

                                <p class="poem-line" style="text-align: left; line-height: 2; margin-top: 1.5rem;">诗文本无高低，唯有真情动人。集中诸篇，皆为诸君平日读书有感、观物生情，或闲时偶得、知己闲谈，不拘格律，不逐绮丽，字字皆赤诚。</p>
                                <p class="poem-line" style="text-align: left; line-height: 2; margin-top: 1.5rem;">我社以"掬月"为名，愿掬岁月于诗词，藏心事于平仄。此集所录，无关工拙，皆为诸君一岁心声，亦是你我以诗为契、以文相和的情谊写照。</p>
                                <p class="poem-line" style="text-align: left; line-height: 2; margin-top: 1.5rem;">今集册已成，展卷可览山河草木、心事微光。愿诗心不老，清韵长存；诸友相知，岁岁皆安。</p>
                                <div style="margin-top: 3rem; text-align: right; padding-right: 2rem;">
                                    <p style="font-size: 1.125rem; color: var(--ink); font-weight: 600; margin-bottom: 0.5rem;">掬月社社长</p>
                                    <p style="font-size: 1.5rem; color: var(--seal-red); font-weight: 900; letter-spacing: 0.2em;">杜万奇</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="page-number page-number-left">
                        <span>02</span>
                    </div>
                </div>
                <div class="page page-right annotation-page">
                    <div class="annotation-content">
                        <div style="text-align: center; padding: 3rem; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
                            <div style="width: 120px; height: 120px; border: 3px solid var(--seal-red); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--seal-red); font-weight: 700; background: rgba(185, 58, 50, 0.05); margin-bottom: 2rem;">
                                <span>掬</span>
                                <span>月</span>
                            </div>
                            <p style="font-size: 1.25rem; color: var(--ink-light); letter-spacing: 0.2em;">掬月诗社</p>
                        </div>
                    </div>
                    <div class="page-number page-number-right">
                        <span>03</span>
                    </div>
                </div>
            `;
            return spread;
        }

        // 创建诗词页面
        function createPoemSpread(poem, index) {
            const spread = document.createElement('div');
            spread.className = 'page-spread';
            spread.innerHTML = `
                <div class="page page-left poem-page">
                    <div class="poem-content-area">
                        <div class="poem-vertical-content">
                            <div class="poem-title-block">
                                <h2 class="poem-title">${poem.title}</h2>
                                <span class="poem-author">${poem.author}</span>
                                ${poem.createTime ? `<span class="poem-time">${poem.createTime}</span>` : ''}
                            </div>
                            <div class="poem-lines">
                                ${poem.content.map(line => `<p class="poem-line">${line}</p>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="page-number page-number-left">
                        <span>${String((index + 2) * 2).padStart(2, '0')}</span>
                    </div>
                </div>
                <div class="page page-right annotation-page">
                    ${poem.bgImage ? `<div class="annotation-bg-image" style="background-image: url('${poem.bgImage}');"></div>` : ''}
                    <div class="annotation-content">
                        <div class="annotation-card">
                            <div class="annotation-card-header">
                                <h3 class="annotation-card-title">
                                    作者心语
                                </h3>
                                <div class="annotation-card-actions">
                                    <button title="深入探索" class="explore-icon-btn" onclick="openAnnotationModal(${index})">深入探索</button>
                                </div>
                            </div>
                            ${poem.interpretation ? `<p class="annotation-text">${poem.interpretation}</p>` : ''}
                            ${poem.notes && poem.notes.length > 0 ? `
                            <div class="annotation-section">
                                <h4 class="annotation-section-title">词句注释</h4>
                                <div class="annotation-notes">
                                    ${poem.notes.slice(0, 3).map(note => `<div class="annotation-note-item">${note}</div>`).join('')}
                                    ${poem.notes.length > 3 ? `<div class="annotation-note-more">...共${poem.notes.length}条注释，点击下方查看全部</div>` : ''}
                                </div>
                            </div>` : ''}
                            <div class="annotation-footer">
                                <span class="annotation-footer-link">掬月诗社</span>
                                <div class="annotation-explore-btn" onclick="openAnnotationModal(${index + 1})">
                                    <span>深入探索</span>
                                    <span class="icon">→</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="page-number page-number-right">
                        <span>${String((index + 2) * 2 + 1).padStart(2, '0')}</span>
                    </div>
                </div>
            `;
            return spread;
        }

        // 初始化分页点
        function initPageDots() {
            const dotsContainer = document.getElementById('pageDots');
            dotsContainer.innerHTML = '';
            
            // 只显示最多7个点
            const maxDots = Math.min(totalPages, 7);
            for (let i = 0; i < maxDots; i++) {
                const dot = document.createElement('div');
                dot.className = 'page-dot';
                dot.onclick = () => goToPage(i);
                dotsContainer.appendChild(dot);
            }
        }

        // 初始化目录
        function initToc() {
            const tocList = document.getElementById('tocList');
            tocList.innerHTML = `
                <div class="toc-drawer-item ${currentPage === 0 ? 'active' : ''}" onclick="goToPage(0); toggleToc();">
                    <div class="toc-drawer-number">封</div>
                    <div class="toc-drawer-info">
                        <div class="toc-drawer-poem-title">封面 & 目录</div>
                        <div class="toc-drawer-author">掬月诗集</div>
                    </div>
                </div>
                <div class="toc-drawer-item ${currentPage === 1 ? 'active' : ''}" onclick="goToPage(1); toggleToc();">
                    <div class="toc-drawer-number">序</div>
                    <div class="toc-drawer-info">
                        <div class="toc-drawer-poem-title">序 言</div>
                        <div class="toc-drawer-author">杜万奇</div>
                    </div>
                </div>
                ${poems.map((poem, i) => `
                    <div class="toc-drawer-item ${currentPage === i + 2 ? 'active' : ''}" onclick="goToPage(${i + 2}); toggleToc();">
                        <div class="toc-drawer-number">${String(i + 1).padStart(2, '0')}</div>
                        <div class="toc-drawer-info">
                            <div class="toc-drawer-poem-title">${poem.title}</div>
                            <div class="toc-drawer-author">${poem.author}</div>
                        </div>
                    </div>
                `).join('')}
            `;
        }

        // 更新页面显示
        function updatePageDisplay() {
            const spreads = document.querySelectorAll('.page-spread');
            spreads.forEach((spread, index) => {
                spread.classList.remove('active', 'flipped');
                if (index === currentPage) {
                    spread.classList.add('active');
                } else if (index < currentPage) {
                    spread.classList.add('flipped');
                }
                // 当前页面 z-index 最高，其他页面根据距离当前页面的位置递减
                spread.style.zIndex = index === currentPage ? 100 : (index < currentPage ? index : totalPages - index);
            });

            // 更新标题
            const titleEl = document.getElementById('pageTitle');
            if (currentPage === 0) {
                titleEl.textContent = '掬月诗集';
            } else if (currentPage === 1) {
                titleEl.textContent = '序 言';
            } else {
                titleEl.textContent = poems[currentPage - 2].title;
            }

            // 更新分页点
            const dots = document.querySelectorAll('.page-dot');
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentPage);
            });

            // 更新按钮状态
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = currentPage === totalPages - 1;

            // 更新目录高亮
            const tocItems = document.querySelectorAll('.toc-drawer-item');
            tocItems.forEach((item, index) => {
                item.classList.toggle('active', index === currentPage);
            });
        }

        // 翻到下一页
        function nextPage() {
            if (currentPage < totalPages - 1) {
                currentPage++;
                updatePageDisplay();
            }
        }

        // 翻到上一页
        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                updatePageDisplay();
            }
        }

        // 跳转到指定页
        function goToPage(pageIndex) {
            if (pageIndex >= 0 && pageIndex < totalPages) {
                currentPage = pageIndex;
                updatePageDisplay();
            }
        }

        // 切换目录
        function toggleToc() {
            const drawer = document.getElementById('tocDrawer');
            const overlay = document.getElementById('tocOverlay');
            drawer.classList.toggle('open');
            overlay.classList.toggle('open');
        }

        // 打开注释面板
        function openAnnotationModal(poemIndex) {
            const poem = poems[poemIndex];
            if (!poem) return;

            const modal = document.getElementById('annotationModal');
            const overlay = document.getElementById('annotationOverlay');
            const titleEl = document.getElementById('modalPoemTitle');
            const bodyEl = document.getElementById('annotationModalBody');

            titleEl.textContent = poem.title + ' - 详解';

            bodyEl.innerHTML = `
                <div class="annotation-modal-poem-info">
                    <span class="annotation-modal-poem-title">${poem.title}</span>
                    <span class="annotation-modal-poem-author">${poem.author}</span>
                    ${poem.createTime ? `<span class="annotation-modal-poem-time">${poem.createTime}</span>` : ''}
                </div>
                
                <div class="annotation-modal-section">
                    <h3 class="annotation-modal-section-title">原文</h3>
                    <div class="annotation-modal-text" style="text-align: center; font-size: 1.125rem; letter-spacing: 0.1em;">
                        ${poem.content.map(line => `<p style="margin-bottom: 0.5rem;">${line}</p>`).join('')}
                    </div>
                </div>
                
                ${poem.interpretation ? `
                <div class="annotation-modal-section">
                    <h3 class="annotation-modal-section-title">作者心语</h3>
                    <p class="annotation-modal-text">${poem.interpretation}</p>
                </div>
                ` : ''}
                
                ${poem.notes && poem.notes.length > 0 ? `
                <div class="annotation-modal-section">
                    <h3 class="annotation-modal-section-title">词句注释</h3>
                    <div class="annotation-modal-notes">
                        ${poem.notes.map(note => `<div class="annotation-modal-note-item">${note}</div>`).join('')}
                    </div>
                </div>
                ` : ''}
            `;

            modal.classList.add('open');
            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        // 关闭注释面板
        function closeAnnotationModal() {
            const modal = document.getElementById('annotationModal');
            const overlay = document.getElementById('annotationOverlay');
            modal.classList.remove('open');
            overlay.classList.remove('open');
            document.body.style.overflow = '';
        }

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                nextPage();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                prevPage();
            } else if (e.key === 'Escape') {
                const drawer = document.getElementById('tocDrawer');
                const modal = document.getElementById('annotationModal');
                if (modal.classList.contains('open')) {
                    closeAnnotationModal();
                } else if (drawer.classList.contains('open')) {
                    toggleToc();
                }
            }
        });

        // 触摸滑动支持
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    nextPage(); // 左滑翻下一页
                } else {
                    prevPage(); // 右滑翻上一页
                }
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', initPages);
    </script>
</body>
</html>
